<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试题库 · 完整合并版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; }
  .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 40px 20px; text-align: center; }
  .header h1 { font-size: 28px; margin-bottom: 8px; }
  .header p { font-size: 14px; opacity: .85; }
  .container { max-width: 920px; margin: 0 auto; padding: 20px 16px 80px; }

  /* ── Tab 导航栏 ── */
  .nav-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .nav-cats a { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 13px; background: #e8f0fe; color: #1a73e8; text-decoration: none; cursor: pointer; transition: .2s; user-select: none; }
  .nav-cats a:hover { background: #1a73e8; color: #fff; }
  .nav-cats a.active { background: #1a73e8; color: #fff; }
  .nav-cats a[data-tab="cat-2"] { background: #fff3e0; color: #e65100; }
  .nav-cats a[data-tab="cat-2"]:hover,
  .nav-cats a[data-tab="cat-2"].active { background: #e65100; color: #fff; }
  .nav-cats a[data-tab="cat-3"] { background: #e8f5e9; color: #2e7d32; }
  .nav-cats a[data-tab="cat-3"]:hover,
  .nav-cats a[data-tab="cat-3"].active { background: #2e7d32; color: #fff; }
  .nav-cats a[data-tab="cat-4"] { background: #f3e5f5; color: #7b1fa2; }
  .nav-cats a[data-tab="cat-4"]:hover,
  .nav-cats a[data-tab="cat-4"].active { background: #7b1fa2; color: #fff; }
  .nav-cats a[data-tab="cat-5"] { background: #ffebee; color: #c62828; }
  .nav-cats a[data-tab="cat-5"]:hover,
  .nav-cats a[data-tab="cat-5"].active { background: #c62828; color: #fff; }

  /* ── 内容区 ── */
  section { display: none; margin-bottom: 40px; padding: 20px 16px; border-radius: 14px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.06); border-left: 4px solid #1a73e8; }
  section.active { display: block; }
  section#cat-2 { border-left-color: #e65100; }
  section#cat-3 { border-left-color: #2e7d32; }
  section#cat-4 { border-left-color: #7b1fa2; }
  section#cat-5 { border-left-color: #c62828; }
  section h2 { font-size: 20px; color: #1a73e8; padding-left: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; cursor: pointer; user-select: none; }
  section h2 .collapse-icon { font-size: 14px; transition: transform .2s; color: inherit; opacity: .5; }
  section.collapsed h2 { margin-bottom: 0; }
  section.collapsed .cat-body { display: none; }
  section#cat-2 h2 { color: #e65100; }
  section#cat-3 h2 { color: #2e7d32; }
  section#cat-4 h2 { color: #7b1fa2; }
  section#cat-5 h2 { color: #c62828; }
  section h2 .badge { font-size: 12px; background: #e8f0fe; color: #1a73e8; padding: 1px 10px; border-radius: 12px; font-weight: 400; }
  section#cat-2 .badge { background: #fff3e0; color: #e65100; }
  section#cat-3 .badge { background: #e8f5e9; color: #2e7d32; }
  section#cat-4 .badge { background: #f3e5f5; color: #7b1fa2; }
  section#cat-5 .badge { background: #ffebee; color: #c62828; }

  details { background: #fff; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; transition: .2s; }
  details:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  details[open] { box-shadow: 0 2px 12px rgba(0,0,0,.1); }
  summary { padding: 14px 16px; cursor: pointer; font-size: 15px; font-weight: 500; list-style: none; display: flex; align-items: flex-start; gap: 10px; user-select: none; }
  summary::-webkit-details-marker { display: none; }
  summary .q-num { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; border-radius: 50%; background: #e8f0fe; color: #1a73e8; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  section#cat-5 summary .q-num { background: #ffebee; color: #c62828; }
  summary .tag { font-size: 11px; padding: 1px 8px; border-radius: 10px; margin-left: auto; flex-shrink: 0; background: #e8f0fe; color: #1a73e8; }
  .q-body { padding: 0 16px 16px 52px; font-size: 14px; line-height: 1.7; color: #444; }
  .q-body p { margin: 6px 0; }
  .q-body pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; margin: 8px 0; }
  footer { text-align: center; padding: 20px; font-size: 13px; color: #999; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .search-wrapper { position: relative; flex: 1; min-width: 200px; }
  #search-input { width: 100%; padding: 10px 36px 10px 14px; border: 2px solid #e0e0e0; border-radius: 24px; font-size: 14px; outline: none; transition: border-color .2s; background: #fff; }
  #search-input:focus { border-color: #1a73e8; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 22px; color: #999; display: none; line-height: 1; }
  .search-clear.visible { display: block; }
  .search-clear:hover { color: #666; }
  .btn-toggle { padding: 8px 20px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; background: #1a73e8; color: #fff; transition: .2s; white-space: nowrap; font-weight: 500; }
  .btn-toggle:hover { background: #0d47a1; }
  .loading { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }
  .no-results { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }
  .load-error { text-align: center; padding: 40px 20px; color: #d32f2f; font-size: 15px; }
  @media (max-width: 640px) { .header h1 { font-size: 22px; } summary { font-size: 14px; } .q-body { padding: 0 12px 12px 16px; } }
</style>
</head>
<body>

<div class="header">
  <h1>📋 面试题库 · 押题版</h1>
  <p>王鹏 · 按押题精简 · 标准答案格式统一</p>
</div>

<div class="container">
  <div class="nav-cats">
    <a data-tab="cat-1" class="active">🤖 AI押题</a>
    <a data-tab="cat-2">🏢 业务测试</a>
    <a data-tab="cat-3">📊 测试管理</a>
    <a data-tab="cat-4">💰 余币宝</a>
    <a data-tab="cat-5">🎙️ 面试记录</a>
  </div>

    <div class="toolbar">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="搜索当前分类题目..." />
        <span class="search-clear" id="search-clear">&times;</span>
      </div>
      <button id="toggle-all" class="btn-toggle">展开全部</button>
    </div>

    <div id="sections-container">
      <div class="loading">加载中...</div>
    </div>

  <footer>
    王鹏 · 面试押题版 &mdash; 共 <span id="question-count">0</span> 题 &mdash; 标准答案格式统一 &mdash; 2026.07
  </footer>

</div>
<script>
(function() {
  'use strict';

  var allData = [];
  var searchQuery = '';
  var currentTab = 'cat-1';

  var container = document.getElementById('sections-container');
  var searchInput = document.getElementById('search-input');
  var searchClear = document.getElementById('search-clear');
  var toggleBtn = document.getElementById('toggle-all');
  var footerCount = document.getElementById('question-count');
  var navTabs = document.querySelectorAll('.nav-cats a');

  // ── 加载数据（双文件） ──
  Promise.all([
    fetch('./data.json').then(function(res) {
      if (!res.ok) throw new Error('data.json: HTTP ' + res.status);
      return res.json();
    }),
    fetch('./interview-1.json').then(function(res) {
      if (!res.ok) throw new Error('interview-1.json: HTTP ' + res.status);
      return res.json();
    })
  ])
    .then(function(results) {
      allData = results[0].concat(results[1]);
      renderAll(allData);
      updateFooterCount(allData);
      switchTab('cat-1');
      bindTabEvents();
      bindEvents();
    })
    .catch(function(err) {
      container.innerHTML = '<div class="load-error">加载题库数据失败: ' + escapeHtml(err.message) + '。<br>请通过 HTTP 服务器访问此页面（不支持 file:// 协议）。</div>';
    });

  // ── Tab 切换 ──
  function switchTab(tabId) {
    currentTab = tabId;
    // 切换 section 可见性
    var sections = container.querySelectorAll('section[id^="cat-"]');
    for (var i = 0; i < sections.length; i++) {
      sections[i].classList.toggle('active', sections[i].id === tabId);
    }
    // 切换 Tab 按钮激活态
    for (var j = 0; j < navTabs.length; j++) {
      navTabs[j].classList.toggle('active', navTabs[j].getAttribute('data-tab') === tabId);
    }
    // 切换后清搜索
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('visible');
    // 显示当前 Tab 所有题目
    var curSection = container.querySelector('#' + tabId);
    if (curSection) {
      var details = curSection.querySelectorAll('details');
      for (var k = 0; k < details.length; k++) {
        details[k].style.display = '';
      }
    }
    // 隐藏 no-results
    var noResults = container.querySelector('.no-results');
    if (noResults) noResults.remove();
    toggleBtn.textContent = '展开全部';
  }

  function bindTabEvents() {
    for (var i = 0; i < navTabs.length; i++) {
      navTabs[i].addEventListener('click', function(e) {
        var tabId = this.getAttribute('data-tab');
        if (tabId) switchTab(tabId);
      });
    }
  }

  // ── 渲染 ──
  function renderAll(data) {
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="no-results">暂无题库数据</div>';
      return;
    }
    var html = '';
    for (var c = 0; c < data.length; c++) {
      html += renderCategory(data[c]);
    }
    container.innerHTML = html;
  }

  function renderCategory(cat) {
    var html = '<section id="' + cat.id + '">';
    html += '<h2><span class="collapse-icon">▼</span> ' + cat.icon + ' ' + escapeHtml(cat.title) + ' <span class="badge">' + escapeHtml(cat.badge) + '</span></h2>';
    html += '<div class="cat-body">';
    for (var q = 0; q < cat.questions.length; q++) {
      html += renderQuestion(cat.questions[q]);
    }
    html += '</div></section>';
    return html;
  }

  function renderQuestion(q) {
    return '<details>' +
      '<summary><span class="q-num">' + q.num + '</span>' + escapeHtml(q.title) + '</summary>' +
      '<div class="q-body">' + q.answer + '</div>' +
    '</details>';
  }

  // ── 搜索（仅当前 Tab） ──
  function bindEvents() {
    // 分类折叠/展开
    container.addEventListener('click', function(e) {
      var h2 = e.target.closest('section h2');
      if (!h2) return;
      var section = h2.closest('section');
      if (!section) return;
      section.classList.toggle('collapsed');
      var icon = h2.querySelector('.collapse-icon');
      if (icon) icon.textContent = section.classList.contains('collapsed') ? '▶' : '▼';
    });

    var debounceTimer = null;
    searchInput.addEventListener('input', function() {
      var val = this.value;
      searchClear.classList.toggle('visible', val.length > 0);
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        searchQuery = val.trim().toLowerCase();
        filterQuestions(searchQuery);
      }, 200);
    });

    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      searchQuery = '';
      filterQuestions('');
      searchInput.focus();
    });

    toggleBtn.addEventListener('click', function() {
      var curSection = container.querySelector('#' + currentTab);
      if (!curSection) return;
      var allDetails = curSection.querySelectorAll('details');
      var visibleDetails = [];
      for (var i = 0; i < allDetails.length; i++) {
        if (allDetails[i].style.display !== 'none') {
          visibleDetails.push(allDetails[i]);
        }
      }
      if (visibleDetails.length === 0) return;
      var anyCollapsed = visibleDetails.some(function(d) { return !d.open; });
      for (var j = 0; j < visibleDetails.length; j++) {
        visibleDetails[j].open = anyCollapsed;
      }
      toggleBtn.textContent = anyCollapsed ? '收起全部' : '展开全部';
      if (anyCollapsed) {
        var curSectionElem = container.querySelector('#' + currentTab);
        if (curSectionElem && curSectionElem.classList.contains('collapsed')) {
          curSectionElem.classList.remove('collapsed');
          var icon = curSectionElem.querySelector('h2 .collapse-icon');
          if (icon) icon.textContent = '▼';
        }
      }
    });
  }

  function filterQuestions(query) {
    // 找到当前激活的 section
    var curSection = container.querySelector('#' + currentTab);
    if (!curSection) return;

    // 找到当前分类在 allData 中的索引
    var catIndex = -1;
    for (var c = 0; c < allData.length; c++) {
      if (allData[c].id === currentTab) {
        catIndex = c;
        break;
      }
    }
    if (catIndex === -1) return;

    var cat = allData[catIndex];
    var details = curSection.querySelectorAll('details');
    var catHasVisible = false;

    for (var q = 0; q < details.length; q++) {
      var question = cat.questions[q];
      if (!question) {
        details[q].style.display = 'none';
        continue;
      }
      var match = !query ||
        question.title.toLowerCase().indexOf(query) !== -1 ||
        question.answer.toLowerCase().indexOf(query) !== -1;
      details[q].style.display = match ? '' : 'none';
      if (match) catHasVisible = true;
    }

    // 在当前 Tab 内显示/隐藏 no-results
    var existingNoResults = curSection.querySelector('.no-results');
    if (!catHasVisible && cat.questions.length > 0) {
      if (!existingNoResults) {
        var el = document.createElement('div');
        el.className = 'no-results';
        el.textContent = '没有找到匹配的题目';
        curSection.appendChild(el);
      }
    } else {
      if (existingNoResults) existingNoResults.remove();
    }
    toggleBtn.textContent = '展开全部';
  }

  function updateFooterCount(data) {
    var total = 0;
    for (var c = 0; c < data.length; c++) {
      total += data[c].questions.length;
    }
    if (footerCount) footerCount.textContent = total;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
